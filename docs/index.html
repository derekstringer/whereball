<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>PawFinder — Adoptable Pets</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080C;--surface:#151519;--card:#1C1C22;--border:#2A2A32;--text:#F5F5F7;--muted:#8E8E93;--primary:#6C5CE7;--primaryDim:rgba(108,92,231,.15);--accent:#FF6B6B;--pill-bg:#222228}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:10;background:var(--bg);padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.header h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
.header p{color:var(--muted);font-size:13px;margin-top:2px}
.source-badge{display:inline-block;background:var(--primaryDim);color:var(--primary);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-top:8px}
.filters{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px 20px 100px}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(.97)}
.card-img{width:100%;aspect-ratio:1;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--muted);overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .emoji-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.modal-photo{width:100%;aspect-ratio:4/3;background:var(--surface);border-radius:12px;overflow:hidden;margin-bottom:16px;display:flex;align-items:center;justify-content:center;font-size:64px;color:var(--muted)}
.modal-photo img{width:100%;height:100%;object-fit:cover}
.photo-gallery{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.photo-gallery::-webkit-scrollbar{display:none}
.photo-thumb{width:64px;height:64px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;flex-shrink:0;background:var(--surface)}
.photo-thumb.active{border-color:var(--primary)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.card-body{padding:12px}
.card-name{font-size:16px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-breed{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.card-pills{display:flex;gap:4px;flex-wrap:wrap}
.card-pill{background:var(--pill-bg);color:var(--muted);font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:80px 20px;color:var(--accent)}
.empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}
/* Detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);width:100%;max-width:500px;max-height:92vh;border-radius:20px 20px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;position:sticky;top:0;background:var(--bg);z-index:1;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:20px;font-weight:700}
.close-btn{width:32px;height:32px;border-radius:50%;background:var(--surface);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px}
.detail-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.detail-pill{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 16px;text-align:center;flex:1;min-width:80px}
.detail-pill .label{font-size:11px;color:var(--muted);margin-bottom:2px}
.detail-pill .value{font-size:14px;font-weight:600}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text)}
.detail-section p{font-size:14px;line-height:1.6;color:var(--muted)}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-tag{background:var(--primaryDim);color:var(--primary);font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500}
.cta-btn{display:block;width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;text-align:center;margin-top:16px}
.contact-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;color:var(--text);text-decoration:none;font-size:14px}
</style>
</head>
<body>
<div class="header">
  <h1>PawFinder</h1>
  <p>Find your new best friend</p>
  <span class="source-badge">Live data — Austin Animal Center</span>
</div>

<div class="filters" id="filters">
  <button class="chip active" data-type="">All</button>
  <button class="chip" data-type="Dog">🐕 Dogs</button>
  <button class="chip" data-type="Cat">🐈 Cats</button>
  <button class="chip" data-type="Bird">🐦 Birds</button>
  <button class="chip" data-type="Rabbit">🐇 Rabbits</button>
  <button class="chip" data-type="Other">🐾 Other</button>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>Fetching adorable pets...</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-name"></h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// New ShelterBuddy dataset (May 2025+) — old wter-evkm stopped updating May 5 2025
const INTAKES='https://data.austintexas.gov/resource/pyqf-r2dc.json';
const EMOJIS={Dog:'🐕',Puppy:'🐕',Cat:'🐈',Kitten:'🐈',Bird:'🐦',Rabbit:'🐇'};
// Map new ShelterBuddy "type" values to filter categories
const TYPE_MAP={Dog:'Dog',Puppy:'Dog',Cat:'Cat',Kitten:'Cat',Bird:'Bird',Rabbit:'Rabbit'};

const SHELTER='ASTN';

// Breed photo APIs — free, CORS-enabled, no API key needed
// Dog CEO: https://dog.ceo/api/breed/{breed}/images/random
// TheCatAPI: https://api.thecatapi.com/v1/images/search
const breedPhotoCache={};  // "type:breed" -> [url, ...]

// Map common shelter breed names to Dog CEO API breed format (lowercase, group/breed)
function dogCeoBreed(shelterBreed){
  const b=shelterBreed.toLowerCase().replace(/mix$/i,'').trim();
  const map={
    'pit bull':'pitbull','pit bull terrier':'pitbull','american pit bull terrier':'pitbull',
    'labrador retriever':'labrador','lab':'labrador',
    'german shepherd':'germanshepherd','german shepherd dog':'germanshepherd',
    'golden retriever':'retriever/golden','labrador retriever':'retriever/golden',
    'chihuahua':'chihuahua','chihuahua - smooth coated':'chihuahua',
    'australian shepherd':'australian/shepherd','miniature poodle':'poodle/miniature',
    'standard poodle':'poodle/standard','toy poodle':'poodle/toy',
    'border collie':'collie/border','rough collie':'collie',
    'great dane':'dane/great','great pyrenees':'pyrenees',
    'siberian husky':'husky','alaskan husky':'husky',
    'boxer':'boxer','beagle':'beagle','rottweiler':'rottweiler',
    'dachshund':'dachshund','pomeranian':'pomeranian','shih tzu':'shihtzu',
    'yorkshire terrier':'terrier/yorkshire','boston terrier':'terrier/boston',
    'jack russell terrier':'terrier/russell','bull terrier':'bullterrier',
    'french bulldog':'bulldog/french','english bulldog':'bulldog/english',
    'cocker spaniel':'spaniel/cocker','cavalier king charles spaniel':'spaniel/cocker',
    'doberman pinscher':'doberman','miniature pinscher':'pinscher/miniature',
    'australian cattle dog':'cattledog/australian','blue heeler':'cattledog/australian',
    'cane corso':'mastiff/bull','mastiff':'mastiff/bull',
    'maltese':'maltese','havanese':'havanese','pug':'pug',
    'basenji':'basenji','akita':'akita','samoyed':'samoyed',
    'weimaraner':'weimaraner','vizsla':'vizsla','whippet':'whippet',
    'greyhound':'greyhound','bloodhound':'bloodhound',
    'chow chow':'chow','shar pei':'sharpei',
    'corgi':'corgi/cardigan','pembroke welsh corgi':'corgi/cardigan',
    'bernese mountain dog':'mountain/bernese','saint bernard':'stbernard',
    'newfoundland':'newfoundland','malinois':'malinois',
    'rhodesian ridgeback':'ridgeback/rhodesian','brittany':'brittany',
    'papillon':'papillon','bichon frise':'bichon/frise'
  };
  return map[b]||b.replace(/\s+/g,'').toLowerCase();
}

async function fetchBreedPhotos(animalType,breed,count=3){
  const key=animalType+':'+breed;
  if(breedPhotoCache[key])return breedPhotoCache[key];
  try{
    if(animalType==='Dog'||animalType==='Puppy'){
      const b=dogCeoBreed(breed);
      const res=await fetch(`https://dog.ceo/api/breed/${b}/images/random/${count}`);
      if(res.ok){const j=await res.json();if(j.status==='success'&&j.message.length){breedPhotoCache[key]=j.message;return j.message;}}
      // Fallback: random dog photo
      const res2=await fetch(`https://dog.ceo/api/breeds/image/random/${count}`);
      if(res2.ok){const j=await res2.json();if(j.status==='success'){breedPhotoCache[key]=j.message;return j.message;}}
    }else if(animalType==='Cat'||animalType==='Kitten'){
      const res=await fetch(`https://api.thecatapi.com/v1/images/search?limit=${count}`);
      if(res.ok){const j=await res.json();const urls=j.map(c=>c.url);if(urls.length){breedPhotoCache[key]=urls;return urls;}}
    }
  }catch(e){}
  breedPhotoCache[key]=[];
  return[];
}

let allPets=[];
let activeType='';

// Compute age label from date_of_birth
function ageFromDob(dob){
  if(!dob)return'Unknown';
  const birth=new Date(dob),now=new Date();
  const months=(now.getFullYear()-birth.getFullYear())*12+(now.getMonth()-birth.getMonth());
  if(months<6)return'Baby';
  if(months<24)return'Young';
  if(months>=96)return'Senior';
  return'Adult';
}

function parseGender(s){
  if(!s)return'Unknown';
  const l=s.toLowerCase();
  if(l.includes('female'))return'Female';
  if(l.includes('male'))return'Male';
  return s;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Normalize a pet record from the new ShelterBuddy schema
function normalizePet(r){
  const animalType=TYPE_MAP[r.type]||r.type||'Other';
  const color=[r.primary_color,r.secondary_color].filter(Boolean).join(' / ');
  const id=r.animal_id;
  return{
    animal_id:id,
    name:r.name,
    animal_type:animalType,
    raw_type:r.type,
    breed:r.primary_breed||'Unknown',
    color:color||'Unknown',
    sex:r.sex||'Unknown',
    spayed:String(r.ispreviouslyspayedneutered||'').toLowerCase()==='true',
    dob:r.date_of_birth,
    age:ageFromDob(r.date_of_birth),
    source:r.source_name,
    condition:r.intake_health_condition,
    found:r.found_address,
    date:r.source_date,
    detailUrl:id?`https://24petconnect.com/${SHELTER}Found/Details/${SHELTER}/${id}`:null
  };
}

async function loadPets(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>Fetching adorable pets...</div>';
  try{
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-60);
    const dateStr=cutoff.toISOString().slice(0,10);
    const where=encodeURIComponent("source_date > '"+dateStr+"'");
    const url=`${INTAKES}?$where=${where}&$order=source_date DESC&$limit=300`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('API returned '+res.status);
    const raw=await res.json();
    if(raw.error)throw new Error(raw.message||raw.error);
    // Deduplicate by animal_id (keep most recent)
    const seen=new Set();
    const deduped=[];
    for(const r of raw){
      if(!seen.has(r.animal_id)){seen.add(r.animal_id);deduped.push(r);}
    }
    allPets=deduped.map(normalizePet);
    // Sort: dogs & cats first, then by date
    const priority={Dog:0,Cat:1,Bird:2,Rabbit:3};
    allPets.sort((a,b)=>(priority[a.animal_type]??9)-(priority[b.animal_type]??9));
    renderPets();
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="error"><p style="font-size:48px;margin-bottom:16px">😿</p><p>Couldn't fetch pets.<br><small style="opacity:.6">${esc(e.message)}</small></p></div>`;
  }
}

function renderPets(){
  let filtered=allPets;
  if(activeType==='Other'){
    filtered=allPets.filter(p=>!['Dog','Cat','Bird','Rabbit'].includes(p.animal_type));
  }else if(activeType){
    filtered=allPets.filter(p=>p.animal_type===activeType);
  }
  if(!filtered.length){
    document.getElementById('content').innerHTML='<div class="empty">No pets found for this filter</div>';
    return;
  }
  const html='<div class="grid">'+filtered.map((p,i)=>{
    const breed=p.breed.split('/')[0].trim();
    const emoji=EMOJIS[p.raw_type]||EMOJIS[p.animal_type]||'🐾';
    const gender=p.sex.toLowerCase().includes('female')?'♀':'♂';
    return`<div class="card" onclick="showDetail(${i})" data-idx="${i}">
      <div class="card-img" id="card-img-${p.animal_id}">${emoji}</div>
      <div class="card-body">
        <div class="card-name">${esc(p.name||breed)}</div>
        <div class="card-breed">${p.name?esc(breed):esc(p.color)}</div>
        <div class="card-pills">
          <span class="card-pill">${p.age}</span>
          <span class="card-pill">${gender}</span>
          <span class="card-pill">${esc(p.raw_type||p.animal_type)}</span>
        </div>
      </div>
    </div>`;
  }).join('')+'</div>';
  document.getElementById('content').innerHTML=html;
  loadCardThumbs(filtered);
}

// Lazy-load card thumbnails with breed photos
async function loadCardThumbs(pets){
  // Group pets by type+breed to batch API calls
  const groups={};
  pets.forEach(p=>{
    const key=p.animal_type+':'+p.breed;
    if(!groups[key])groups[key]={type:p.animal_type,breed:p.breed,ids:[]};
    groups[key].ids.push(p.animal_id);
  });
  for(const g of Object.values(groups)){
    const photos=await fetchBreedPhotos(g.type,g.breed,1);
    if(photos.length>0){
      g.ids.forEach(id=>{
        const el=document.getElementById('card-img-'+id);
        if(el)el.innerHTML=`<img src="${photos[0]}" alt="Breed photo" loading="lazy" onerror="this.remove()"/>`;
      });
    }
  }
}

function showDetail(idx){
  const filtered=activeType==='Other'
    ?allPets.filter(p=>!['Dog','Cat','Bird','Rabbit'].includes(p.animal_type))
    :activeType?allPets.filter(p=>p.animal_type===activeType):allPets;
  const p=filtered[idx];if(!p)return;
  document.getElementById('modal-name').textContent=p.name||p.breed;
  const gender=parseGender(p.sex);
  const emoji=EMOJIS[p.raw_type]||EMOJIS[p.animal_type]||'🐾';
  // Show loading state for photo area, then probe for all photos
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-photo" id="main-photo"><div class="spinner"></div></div>
    <div class="photo-gallery" id="photo-gallery" style="display:none"></div>
    ${p.detailUrl?`<a href="${esc(p.detailUrl)}" target="_blank" style="display:block;text-align:center;color:var(--primary);font-size:13px;margin:-8px 0 16px;text-decoration:none">View on 24PetConnect ↗</a>`:''}
    <div class="detail-row">
      <div class="detail-pill"><div class="label">Age</div><div class="value">${p.age}</div></div>
      <div class="detail-pill"><div class="label">Gender</div><div class="value">${gender}</div></div>
      <div class="detail-pill"><div class="label">Type</div><div class="value">${esc(p.raw_type||p.animal_type)}</div></div>
    </div>
    <div class="detail-section"><h3>Breed</h3><p>${esc(p.breed)}</p></div>
    <div class="detail-section"><h3>Color</h3><p>${esc(p.color)}</p></div>
    ${p.dob?`<div class="detail-section"><h3>Date of birth</h3><p>${new Date(p.dob).toLocaleDateString()}</p></div>`:''}
    ${p.found?`<div class="detail-section"><h3>Found near</h3><p>${esc(p.found)}</p></div>`:''}
    <div class="detail-section"><h3>Details</h3>
      <div class="detail-tags">
        ${p.spayed?'<span class="detail-tag">Spayed/Neutered</span>':''}
        ${p.source?`<span class="detail-tag">${esc(p.source)}</span>`:''}
        ${p.condition?`<span class="detail-tag">${esc(p.condition)}</span>`:''}
      </div>
    </div>
    <div class="detail-section"><h3>Contact</h3>
      <a href="tel:5129780500" class="contact-row">📞 (512) 978-0500</a>
      <a href="mailto:animal.srvcinfo@austintexas.gov" class="contact-row">✉️ animal.srvcinfo@austintexas.gov</a>
    </div>
    <a href="https://www.austintexas.gov/austin-animal-center" target="_blank" class="cta-btn">View at Austin Animal Center ↗</a>
  `;
  document.getElementById('modal').classList.add('open');
  // Fetch breed photos for gallery
  fetchBreedPhotos(p.animal_type,p.breed,4).then(photos=>{
    const mainEl=document.getElementById('main-photo');
    const galleryEl=document.getElementById('photo-gallery');
    if(!mainEl)return;
    if(photos.length===0){
      mainEl.innerHTML=emoji;
      return;
    }
    mainEl.innerHTML=`<img src="${photos[0]}" alt="${esc(p.breed)}" onerror="this.parentNode.innerHTML='${emoji}'"/>`;
    if(photos.length>1){
      galleryEl.style.display='flex';
      galleryEl.innerHTML=photos.map((url,i)=>
        `<div class="photo-thumb${i===0?' active':''}" onclick="switchPhoto('${url}',this)"><img src="${url}" alt="Photo ${i+1}"/></div>`
      ).join('');
    }
  });
}

function switchPhoto(url,thumbEl){
  const main=document.getElementById('main-photo');
  if(main)main.innerHTML=`<img src="${url}" alt="Pet photo"/>`;
  document.querySelectorAll('.photo-thumb').forEach(t=>t.classList.remove('active'));
  if(thumbEl)thumbEl.classList.add('active');
}

function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))closeModal()});

// Filter chips
document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeType=btn.dataset.type;
    renderPets();
  });
});

loadPets();
</script>
</body>
</html>
